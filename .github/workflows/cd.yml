name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: read

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: settlement

jobs:
  deploy-local-k8s:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' }}
    runs-on: [self-hosted, linux]
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Derive image tag from commit SHA
        run: |
          IMAGE_TAG="${{ github.event.workflow_run.head_sha || github.sha }}"
          IMAGE_TAG="${IMAGE_TAG:0:12}"
          echo "IMAGE_TAG=$IMAGE_TAG" >> "$GITHUB_ENV"
          echo "Using image tag: $IMAGE_TAG"

      - name: Build Docker image locally
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Load image into kind cluster
        run: |
          kubectl config use-context kind-settlement-local
          kind load docker-image ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} --name settlement-local

      - name: Deploy to local cluster
        run: |
          kubectl apply -f k8s/deployment.yaml -n settlement
          kubectl apply -f k8s/service.yaml -n settlement
          kubectl set image deployment/settlement settlement=${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} --record
          kubectl rollout status deployment/settlement --timeout=300s
          kubectl get pods,svc -n default
