name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-local-k8s:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: [self-hosted, linux]
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image locally
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: settlement:latest

      - name: Load image into kind cluster
        run: |
          kubectl config use-context kind-settlement-local
          kind load docker-image settlement:latest --name settlement-local

      - name: Deploy to local cluster
        run: |
          kubectl apply -f k8s/deployment.yaml -n settlement
          kubectl apply -f k8s/service.yaml -n settlement
          kubectl set image deployment/settlement settlement=settlement:latest --record
          kubectl rollout status deployment/settlement --timeout=300s
          kubectl get pods,svc -n default
